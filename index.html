<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusCatcher</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="map"></div>
        <div id="panel">
            <div id="setup-mode">
                <div class="step" id="step-home">
                    <p>Кликните на карте: <b>откуда выходите</b> 🏠</p>
                </div>
                <div class="step hidden" id="step-stopA">
                    <p>Кликните на <b>остановку</b> посадки 🚌</p>
                </div>
                <div class="step hidden" id="step-stopB">
                    <p>Кликните на <b>остановку</b> высадки 🏁</p>
                </div>
                <div id="routes-list" class="hidden">
                    <h3>Автобусы:</h3>
                    <div id="routes-container"></div>
                </div>
                <button id="reset-btn" class="btn-secondary">Сбросить</button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js?v=4"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch((err) => {
                console.log('SW registration failed:', err);
            });
        }
    </script>
</body>
</html>
